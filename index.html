<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopNest</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0a0a;
  color: #d4af37;
}

.navbar {
  background: #000;
  padding: 15px;
  text-align: center;
  font-size: 26px;
  font-weight: bold;
  border-bottom: 2px solid #d4af37;
}

.hero {
  height: 90vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* الصورة فوق العنوان */
.hero img {
  width: 150px;
  border-radius: 50%;
  margin-bottom: 20px;
}

/* زر */
.btn {
  margin-top: 20px;
  padding: 12px 30px;
  background: #d4af37;
  color: black;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  font-size: 16px;
  transition: 0.3s;
}

.btn:hover {
  background: #f5d76e;
  transform: scale(1.1);
}
</style>
</head>

<body>

<div class="navbar">ShopNest</div>

<div class="hero">
  <img src="https://scontent.xx.fbcdn.net/v/t1.15752-9/646712474_1629617008362892_5321415813833477524_n.jpg?_nc_cat=102&ccb=1-7&_nc_sid=9f807c&_nc_ohc=Js_MxrmEzeUQ7kNvwGRd8cC&_nc_oc=Adqe7ob22FNdYmmPU2iQELy8rTa5urhdEPBNN9LNGOxmWDh6NRg_hmWoWFW2DuMN5gDKgaIGQc0emmqhUz1e95yi&_nc_ad=z-m&_nc_cid=0&_nc_zt=23&_nc_ht=scontent.xx&_nc_ss=7a32e&oh=03_Q7cD4wHsa3u93ouB-134de2f0C-MS9gYtKlH2fxas4incIfYQw&oe=69E7D89C" alt="ShopNest Logo">
  <h1>ShopNest مرحبا بك في </h1>
  <p>أفضل مكان لاكتشاف المنتجات</p>

  <button class="btn" onclick="goPage()">ابدأ الآن</button>
</div>

<script>
function goPage() {
  window.location.href = "products.html";
}
</script>

</body>
</html>
