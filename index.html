<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopNest</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0a0a;
  color: #d4af37;
}

.navbar {
  background: #000;
  padding: 15px;
  text-align: center;
  font-size: 26px;
  font-weight: bold;
  border-bottom: 2px solid #d4af37;
}

.hero {
  height: 90vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* الصورة فوق العنوان */
.hero img {
  width: 150px;
  border-radius: 50%;
  margin-bottom: 20px;
}

/* زر */
.btn {
  margin-top: 20px;
  padding: 12px 30px;
  background: #d4af37;
  color: black;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  font-size: 16px;
  transition: 0.3s;
}

.btn:hover {
  background: #f5d76e;
  transform: scale(1.1);
}
</style>
</head>

<body>

<div class="navbar">ShopNest</div>

<div class="hero">
  <img src="" alt="">
  <h1>shopnest مرحبا بك في </h1>
  <p>أفضل مكان لاكتشاف المنتجات</p>

  <button class="btn" onclick="goPage()">ابدأ الآن</button>
</div>

<script>
function goPage() {
  window.location.href = "products.html";
}
</script>

</body>
</html>
